<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>She Stayed for the Kids | Bradley Hobbs</title>

<style>
:root {
    --bg-main: #2C3440;
    --bg-light: #F4F1EA;
    --accent: #C89B3C;
    --accent-soft: #E2BC6B;
    --text-dark: #2A2A2A;
    --text-muted: #6B6B6B;
}

/* BASE */
body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg-main);
    color: var(--text-dark);
}

/* HERO (FIXED) */
.hero {
    padding: 20px 15px 0;
    text-align: center;
}

/* BANNER */
.banner {
    width: 100%;
    max-width: 800px;
    border-radius: 14px;
    display: block;
    margin: auto;

    /* GLOW */
    box-shadow:
        0 0 25px rgba(200,155,60,0.45),
        0 0 60px rgba(200,155,60,0.25);
}

/* TAGLINE */
.tagline {
    font-size: 0.95rem;
    color: #E0E0E0;
    margin-top: 10px;
}

/* SECTION */
.section {
    padding: 30px 15px;
    max-width: 800px;
    margin: auto;
}

/* CARD */
.card {
    background: var(--bg-light);
    border-radius: 14px;
    padding: 25px;
    margin-top: 15px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

/* HEADINGS */
h2 {
    text-align: center;
    color: var(--accent);
    margin-bottom: 12px;
}

/* TEXT */
p {
    line-height: 1.6;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 12px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    margin: 6px;
    padding: 10px 22px;
    border-radius: 25px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.95rem;
    transition: 0.3s;
}

.btn:hover {
    background: var(--accent-soft);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 0.85rem;
    color: #CFCFCF;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <img src="banner.png" alt="She Stayed for the Kids Banner" class="banner">

    <p class="tagline">Not every classroom is what it appears to be.</p>

</section>

<!-- INTRO -->
<section class="section">
    <div class="card">
        <h2>Begin</h2>
        <p>
            A classroom shaped by inconsistency.  
            A pattern that does not break.  
            A story revealed through those who remain and those who understand.
        </p>

        <div style="text-align:center;">
            <a href="intro.html" class="btn">Introduction</a>
            <a href="content.html" class="btn">Contents</a>
        </div>
    </div>
</section>

<!-- ACTS -->
<section class="section">
    <div class="card">
        <h2>The Book</h2>
        <div style="text-align:center;">
            <a href="act1.html" class="btn">Act I</a>
            <a href="act2.html" class="btn">Act II</a>
            <a href="act3.html" class="btn">Act III</a>
            <a href="act4.html" class="btn">Act IV</a>
        </div>
    </div>
</section>

<!-- END -->
<section class="section">
    <div class="card">
        <h2>Closing</h2>
        <div style="text-align:center;">
            <a href="conclusion.html" class="btn">Conclusion</a>
            <a href="about.html" class="btn">About</a>
        </div>
    </div>
</section>

<footer>
    © 2026 Bradley Hobbs
</footer>

</body>
</html>
